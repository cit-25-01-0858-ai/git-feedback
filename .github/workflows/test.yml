# CI/CD Step 1: Run Tests
# Triggers on push or PR targeting dev, testing, or release branches.
# Runs unit tests with the repo encryption key secret.
name: Run Tests

on:
  push:
    branches: [ dev, testing, release ]
  pull_request:
    branches: [ dev, testing, release ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
