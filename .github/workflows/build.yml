# CI/CD Step 2: Build Application
# Triggers sequentially after "Run Tests" finishes successfully on testing or release branches.
# Runs the Next.js production build.
name: Build Application

on:
  workflow_run:
    workflows: ["Run Tests"]
    types:
      - completed
    branches:
      - testing
      - release

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
