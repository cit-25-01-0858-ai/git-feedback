# CI/CD Step 3: Create Release PR
# Triggers sequentially after "Build Application" finishes successfully on the testing branch.
# Creates/opens a Pull Request from testing to release branch.
name: Create Release PR

on:
  workflow_run:
    workflows: ["Build Application"]
    types:
      - completed
    branches:
      - testing

jobs:
  create-pr:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Pull Request to Release
        run: |
          # Check if PR already exists
          PR_EXISTS=$(gh pr list --head testing --base release --json number --jq '.[0].number')
          if [ -n "$PR_EXISTS" ]; then
            echo "PR already exists: #$PR_EXISTS. Skipping."
          else
            gh pr create \
              --title "release: merge testing into release" \
              --body "Automated release PR created after successful build and test workflows." \
              --base release \
              --head testing
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
